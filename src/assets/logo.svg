<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="50%" style="stop-color:#4834D4"/>
      <stop offset="100%" style="stop-color:#3B2F9E"/>
    </linearGradient>
    
    <!-- Board column gradients -->
    <linearGradient id="col1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#FF4D8C"/>
    </linearGradient>
    <linearGradient id="col2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB86C"/>
      <stop offset="100%" style="stop-color:#FFA33C"/>
    </linearGradient>
    <linearGradient id="col3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5FBA6B"/>
      <stop offset="100%" style="stop-color:#45A050"/>
    </linearGradient>
    <linearGradient id="col4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#3BB8B0"/>
    </linearGradient>
    
    <!-- Card gradients -->
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#F8F9FF;stop-opacity:0.9"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D1B69" flood-opacity="0.3"/>
    </filter>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1A103F" flood-opacity="0.25"/>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Rounded background base -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Subtle background pattern - board dots -->
  <g opacity="0.08">
    <circle cx="80" cy="80" r="2" fill="white"/>
    <circle cx="140" cy="80" r="2" fill="white"/>
    <circle cx="200" cy="80" r="2" fill="white"/>
    <circle cx="260" cy="80" r="2" fill="white"/>
    <circle cx="320" cy="80" r="2" fill="white"/>
    <circle cx="380" cy="80" r="2" fill="white"/>
    <circle cx="440" cy="80" r="2" fill="white"/>
    <circle cx="80" cy="140" r="2" fill="white"/>
    <circle cx="140" cy="140" r="2" fill="white"/>
    <circle cx="200" cy="140" r="2" fill="white"/>
    <circle cx="260" cy="140" r="2" fill="white"/>
    <circle cx="320" cy="140" r="2" fill="white"/>
    <circle cx="380" cy="140" r="2" fill="white"/>
    <circle cx="440" cy="140" r="2" fill="white"/>
  </g>

  <!-- Board columns container -->
  <g filter="url(#glow)">
    
    <!-- Column 1 - Todo -->
    <g transform="translate(48, 88)">
      <rect x="0" y="0" width="88" height="336" rx="12" ry="12" fill="url(#col1)" opacity="0.15"/>
      <rect x="0" y="0" width="88" height="40" rx="12" ry="12" fill="url(#col1)" opacity="0.9"/>
      <text x="44" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">To Do</text>
      
      <!-- Cards -->
      <rect x="8" y="52" width="72" height="50" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="58" width="64" height="6" rx="3" fill="#FF6B9D" opacity="0.4"/>
      <rect x="12" y="68" width="48" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      <rect x="12" y="76" width="40" height="4" rx="2" fill="#8892B0" opacity="0.3"/>
      
      <rect x="8" y="112" width="72" height="42" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="118" width="64" height="6" rx="3" fill="#A8E6CF" opacity="0.6"/>
      <rect x="12" y="128" width="52" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      
      <rect x="8" y="164" width="72" height="56" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="170" width="64" height="6" rx="3" fill="#FFD93D" opacity="0.6"/>
      <rect x="12" y="180" width="44" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      <rect x="12" y="188" width="56" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
      
      <!-- Add card button -->
      <rect x="8" y="230" width="72" height="28" rx="8" ry="8" fill="white" opacity="0.1"/>
      <text x="44" y="249" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.6" text-anchor="middle">+</text>
    </g>
    
    <!-- Column 2 - In Progress -->
    <g transform="translate(152, 88)">
      <rect x="0" y="0" width="88" height="336" rx="12" ry="12" fill="url(#col2)" opacity="0.15"/>
      <rect x="0" y="0" width="88" height="40" rx="12" ry="12" fill="url(#col2)" opacity="0.9"/>
      <text x="44" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">In Progress</text>
      
      <!-- Cards -->
      <rect x="8" y="52" width="72" height="58" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="58" width="64" height="6" rx="3" fill="#FFB86C" opacity="0.5"/>
      <rect x="12" y="68" width="50" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      <rect x="12" y="76" width="58" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
      <rect x="12" y="84" width="36" height="4" rx="2" fill="#8892B0" opacity="0.3"/>
      <!-- Progress bar -->
      <rect x="12" y="94" width="64" height="6" rx="3" fill="#E8EBF5"/>
      <rect x="12" y="94" width="38" height="6" rx="3" fill="#FFB86C"/>
      
      <rect x="8" y="120" width="72" height="44" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="126" width="64" height="6" rx="3" fill="#FF6B9D" opacity="0.4"/>
      <rect x="12" y="136" width="42" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      <rect x="12" y="144" width="60" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
    </g>
    
    <!-- Column 3 - Review -->
    <g transform="translate(256, 88)">
      <rect x="0" y="0" width="88" height="336" rx="12" ry="12" fill="url(#col3)" opacity="0.15"/>
      <rect x="0" y="0" width="88" height="40" rx="12" ry="12" fill="url(#col3)" opacity="0.9"/>
      <text x="44" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Review</text>
      
      <!-- Cards -->
      <rect x="8" y="52" width="72" height="46" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="58" width="64" height="6" rx="3" fill="#5FBA6B" opacity="0.5"/>
      <rect x="12" y="68" width="46" height="4" rx="2" fill="#8892B0" opacity="0.5"/>
      <rect x="12" y="76" width="38" height="4" rx="2" fill="#8892B0" opacity="0.3"/>
      <!-- Avatar icon -->
      <circle cx="70" cy="82" r="10" fill="#5FBA6B" opacity="0.3"/>
      <circle cx="70" cy="80" r="3" fill="#5FBA6B" opacity="0.7"/>
      <rect x="66" y="85" width="8" height="6" rx="3" fill="#5FBA6B" opacity="0.5"/>
    </g>
    
    <!-- Column 4 - Done -->
    <g transform="translate(360, 88)">
      <rect x="0" y="0" width="88" height="336" rx="12" ry="12" fill="url(#col4)" opacity="0.15"/>
      <rect x="0" y="0" width="88" height="40" rx="12" ry="12" fill="url(#col4)" opacity="0.9"/>
      <text x="44" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Done</text>
      
      <!-- Cards -->
      <rect x="8" y="52" width="72" height="40" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="58" width="64" height="6" rx="3" fill="#4ECDC4" opacity="0.5"/>
      <rect x="12" y="68" width="40" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
      <!-- Checkmark -->
      <circle cx="68" cy="76" r="8" fill="#4ECDC4" opacity="0.7"/>
      <path d="M64 76 L67 79 L72 73" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <rect x="8" y="102" width="72" height="38" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="108" width="64" height="6" rx="3" fill="#A8E6CF" opacity="0.6"/>
      <rect x="12" y="118" width="48" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
      <circle cx="68" cy="124" r="8" fill="#4ECDC4" opacity="0.7"/>
      <path d="M64 124 L67 127 L72 121" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <rect x="8" y="150" width="72" height="42" rx="8" ry="8" fill="url(#cardGrad1)" filter="url(#cardShadow)"/>
      <rect x="12" y="156" width="64" height="6" rx="3" fill="#FFD93D" opacity="0.5"/>
      <rect x="12" y="166" width="54" height="4" rx="2" fill="#8892B0" opacity="0.4"/>
      <circle cx="68" cy="174" r="8" fill="#4ECDC4" opacity="0.7"/>
      <path d="M64 174 L67 177 L72 171" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Decorative elements - floating sparkles -->
  <g opacity="0.6">
    <!-- Top left sparkle -->
    <path d="M36 48 L38 42 L40 48 L46 50 L40 52 L38 58 L36 52 L30 50 L36 48Z" fill="#FFEAA7" filter="url(#glow)"/>
    
    <!-- Top right sparkle -->
    <path d="M468 60 L470 54 L472 60 L478 62 L472 64 L470 70 L468 64 L462 62 L468 60Z" fill="#FFEAA7" filter="url(#glow)"/>
    
    <!-- Bottom left sparkle -->
    <path d="M44 430 L46 424 L48 430 L54 432 L48 434 L46 440 L44 434 L38 432 L44 430Z" fill="#FFEAA7" filter="url(#glow)"/>
    
    <!-- Bottom right sparkle -->
    <path d="M456 450 L458 444 L460 450 L466 452 L460 454 L458 460 L456 454 L450 452 L456 450Z" fill="#FFEAA7" filter="url(#glow)"/>
  </g>

  <!-- App name below -->
  <text x="256" y="462" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3" opacity="0.95">FLOWBOARD</text>
</svg>